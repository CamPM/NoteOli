name: Deploy NoteOli to GitHub Pages

on:
  push:
    branches: ["main"] # Fires automatically on every main commit
  workflow_dispatch: # Forces a manual "Run Workflow" override button in your browser

# Sets permissions of the GITHUB_TOKEN to allow native cloud deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent builds from clashing and breaking your site state
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Compile Vite Production Build
        run: npm run build

      - name: Setup Native GitHub Pages Infrastructure
        uses: actions/configure-pages@v5

      - name: Package Compiled Assets for Deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Targets your clean Vite output directory folder

  deploy-to-web:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-and-compile
    steps:
      - name: Force Live Publish to GitHub Pages Servers
        id: deployment
        uses: actions/deploy-pages@v4
        
